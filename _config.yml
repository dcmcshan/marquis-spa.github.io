title: Marquis SPA
description: Premium spa and wellness services
url: "https://dcmcshan.github.io"
baseurl: "/marquis-spa"

theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      image: "/assets/images/hero.jpg"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .gitignore

include:
  - .nojekyll
